<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CareerOS</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      color: #818cf8;
      margin: 0 0 12px 0;
    }
    .status {
      font-size: 13px;
      color: #a0a0b0;
      margin-bottom: 12px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #818cf8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover {
      background: #6366f1;
    }
    .btn-secondary {
      background: #2d2d4a;
      color: #c0c0d0;
    }
    .btn-secondary:hover {
      background: #3d3d5a;
    }
    .info {
      font-size: 12px;
      color: #808090;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>CareerOS</h1>
  <div class="status">Click below to open CareerOS or view intelligence on the current page.</div>
  <button class="btn" id="open-app">Open Dashboard</button>
  <button class="btn btn-secondary" id="refresh-page">Refresh Page Intelligence</button>
  <div class="info">CareerOS v0.1.0 — AI Career Intelligence</div>

  <script>
    document.getElementById("open-app").onclick = () => {
      chrome.tabs.create({ url: "http://localhost:3000" });
    };
    document.getElementById("refresh-page").onclick = () => {
      chrome.tabs.reload();
    };
  </script>
</body>
</html>
